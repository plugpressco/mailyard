name: Release

# On a version tag: build the production zip, attach it to a GitHub Release,
# and deploy trunk + tag + assets to the WordPress.org SVN repo. The SVN steps
# skip cleanly until the plugin is approved on WordPress.org and the
# SVN_USERNAME / SVN_PASSWORD repo secrets exist — you still get the GitHub
# Release zip in the meantime.
#
# Release flow (version bumps need Fahim's explicit OK):
#   bump the version (mailyard.php header + MAILYARD_VERSION, readme.txt
#   Stable tag, package.json) → commit → git tag vX.Y.Z && git push --follow-tags

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build, publish zip, deploy to WP.org
    runs-on: ubuntu-latest
    env:
      HAS_SVN: ${{ secrets.SVN_USERNAME != '' && secrets.SVN_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches the plugin version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          HDR="$(grep -m1 -oE 'Version:[[:space:]]*[0-9.]+' mailyard.php | grep -oE '[0-9.]+')"
          STABLE="$(grep -m1 -oE 'Stable tag:[[:space:]]*[0-9.]+' readme.txt | grep -oE '[0-9.]+')"
          echo "tag=$TAG  header=$HDR  stable=$STABLE"
          if [ "$TAG" != "$HDR" ] || [ "$TAG" != "$STABLE" ]; then
            echo "::error::Tag v$TAG does not match mailyard.php ($HDR) / readme.txt Stable tag ($STABLE). Bump and commit before tagging."
            exit 1
          fi
          echo "VERSION=$TAG" >> "$GITHUB_ENV"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # @plugpress/ui is a PRIVATE GitHub repo pinned via git in package.json;
      # npm needs a PAT (Contents: read on plugpressco/plugpress-ui) stored as
      # the GH_PACKAGES_TOKEN secret. Same setup as plugin-check.yml.
      - name: Authenticate private @plugpress/ui
        run: |
          if [ -z "${{ secrets.GH_PACKAGES_TOKEN }}" ]; then
            echo "::error::GH_PACKAGES_TOKEN secret is not set — required to install the private @plugpress/ui dependency."
            exit 1
          fi
          # Two insteadOf values on ONE url key — the second needs --add, or it
          # overwrites the first. npm resolves @plugpress/ui to the ssh://git@
          # form, so that rewrite must survive. Same as plugin-check.yml.
          git config --global url."https://x-access-token:${{ secrets.GH_PACKAGES_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://x-access-token:${{ secrets.GH_PACKAGES_TOKEN }}@github.com/".insteadOf "git@github.com:"

      - name: Install build tooling
        run: npm ci

      # scripts/zip.js builds the admin assets, zips, and integrity-checks that
      # build/admin.js made it in and that vendor/ + the Freemius SDK did NOT
      # (the free build ships no runtime composer deps; Pro ships the SDK).
      - name: Build plugin zip
        run: npm run zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mailyard-${{ env.VERSION }}.zip
          fail_on_unmatched_files: true
          generate_release_notes: true

      # vendor/ never ships (excluded in .distignore), so no composer prune is
      # needed before the SVN rsync.
      - name: Deploy to WordPress.org SVN
        if: env.HAS_SVN == 'true'
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: mailyard
          ASSETS_DIR: .wordpress.org

      - name: SVN deploy skipped
        if: env.HAS_SVN != 'true'
        run: echo "::notice::SVN_USERNAME/SVN_PASSWORD secrets not set — WordPress.org deploy skipped (GitHub Release still published)."
