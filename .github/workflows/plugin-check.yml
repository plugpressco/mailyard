name: Plugin Check

# WordPress.org's own review tool (Plugin Check) against the built plugin, so
# directory problems surface in CI instead of during the .org review queue.

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  plugin-check:
    name: WP.org Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Don't leave the repo-scoped GITHUB_TOKEN in git config — it can't
          # read the private @plugpress/ui repo and would shadow the credential
          # set below when npm resolves the git dependency.
          persist-credentials: false

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # @plugpress/ui is a PRIVATE GitHub repo pinned via git in package.json;
      # the default GITHUB_TOKEN can't read other repos, so npm needs a PAT
      # (fine-grained, Contents: read on plugpressco/plugpress-ui) stored as
      # the GH_PACKAGES_TOKEN org/repo secret.
      - name: Authenticate private @plugpress/ui
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_PACKAGES_TOKEN secret is not set — required to install the private @plugpress/ui dependency."
            exit 1
          fi
          # Let gh inject git credentials — a classic OAuth/PAT token does NOT
          # authenticate via an x-access-token:<token>@ URL. npm resolves
          # @plugpress/ui to the ssh://git@ form, so rewrite it to plain https
          # and gh's credential helper supplies the token. --add so both
          # insteadOf values survive on the one url key.
          gh auth setup-git
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"

      - name: Build admin assets
        run: |
          npm ci
          npm run build

      - name: Run Plugin Check
        uses: WordPress/plugin-check-action@v1
        with:
          # vendor/ is dev-only (phpunit) and never ships — exclude it so the
          # check scans exactly what the zip carries.
          exclude-directories: 'node_modules,src,scripts,tests,bin,docs,vendor'
